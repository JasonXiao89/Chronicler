<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Chronicler</title>
<style>
  :root {
    --bg: #f4eee6;
    --bg2: #fbf7f2;
    --bg3: #efe5d8;
    --bg4: #e5d7c5;
    --border: rgba(108, 89, 72, 0.14);
    --border-strong: rgba(108, 89, 72, 0.22);
    --text: #43342a;
    --text-muted: #8d7a68;
    --text-soft: #66584c;
    --accent: #a07b5f;
    --accent-strong: #8d6a51;
    --accent2: #83998f;
    --user-bg: rgba(235, 226, 214, 0.95);
    --assistant-bg: rgba(251, 247, 242, 0.92);
    --thinking-bg: rgba(241, 234, 224, 0.95);
    --claude-color: #c8835f;
    --codex-color: #7f9886;
    --cursor-color: #8ca1b8;
    --tag-bg: rgba(153, 133, 112, 0.12);
    --scrollbar: rgba(132, 111, 95, 0.26);
    --shadow-soft: 0 16px 28px rgba(97, 77, 60, 0.08);
    --shadow-card: 0 10px 22px rgba(97, 77, 60, 0.09);
    --heat-rgb: 160, 123, 95;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  button, input {
    font: inherit;
  }

  body {
    font-family: "Segoe UI Variable Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    letter-spacing: 0.01em;
    background-image:
      radial-gradient(circle at top left, rgba(160, 123, 95, 0.12), transparent 32%),
      radial-gradient(circle at top right, rgba(131, 153, 143, 0.09), transparent 26%),
      linear-gradient(180deg, #f8f4ee, #f2ebe1);
  }

  body[data-theme="dark"] {
    --bg: #14110f;
    --bg2: #1c1815;
    --bg3: #27211d;
    --bg4: #332b25;
    --border: rgba(223, 206, 187, 0.14);
    --border-strong: rgba(223, 206, 187, 0.24);
    --text: #f2e8dc;
    --text-muted: #bba999;
    --text-soft: #d7c6b7;
    --accent: #c79b76;
    --accent-strong: #e0b58f;
    --accent2: #9ab5aa;
    --user-bg: rgba(50, 40, 32, 0.92);
    --assistant-bg: rgba(29, 24, 21, 0.92);
    --thinking-bg: rgba(39, 32, 28, 0.92);
    --claude-color: #e3a380;
    --codex-color: #97b9a7;
    --cursor-color: #a2bdd4;
    --tag-bg: rgba(199, 155, 118, 0.12);
    --scrollbar: rgba(201, 184, 168, 0.24);
    --shadow-soft: 0 16px 30px rgba(0, 0, 0, 0.28);
    --shadow-card: 0 10px 24px rgba(0, 0, 0, 0.24);
    --heat-rgb: 199, 155, 118;
    color-scheme: dark;
    background-image:
      radial-gradient(circle at top left, rgba(199, 155, 118, 0.14), transparent 30%),
      radial-gradient(circle at top right, rgba(154, 181, 170, 0.09), transparent 24%),
      linear-gradient(180deg, #191512, #110f0d);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(118, 97, 80, 0.035), rgba(118, 97, 80, 0.035)) 0 0 / 100% 1px no-repeat,
      radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.38), transparent 18%),
      repeating-linear-gradient(
        0deg,
        rgba(118, 97, 80, 0.012) 0,
        rgba(118, 97, 80, 0.012) 1px,
        transparent 1px,
        transparent 28px
      );
    opacity: 0.55;
  }

  body[data-theme="dark"]::before {
    background:
      linear-gradient(rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.025)) 0 0 / 100% 1px no-repeat,
      radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.06), transparent 18%),
      repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.01) 0,
        rgba(255, 255, 255, 0.01) 1px,
        transparent 1px,
        transparent 28px
      );
    opacity: 0.4;
  }

  *:focus-visible {
    outline: 2px solid var(--accent-strong);
    outline-offset: 2px;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--scrollbar);
    border-radius: 999px;
    border: 2px solid transparent;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(132, 111, 95, 0.38); }

  /* Header */
  .header {
    background: linear-gradient(180deg, rgba(251, 247, 242, 0.96), rgba(246, 239, 230, 0.94));
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-shrink: 0;
    box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.5);
    position: relative;
    z-index: 1;
  }
  .header-brand {
    min-width: 180px;
  }
  .header-kicker {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: clamp(20px, 2vw, 24px);
    line-height: 1;
    font-weight: 650;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    letter-spacing: 0.02em;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .page-tabs {
    display: flex;
    gap: 6px;
    padding: 4px;
    border-radius: 999px;
    background: rgba(255, 251, 246, 0.74);
    border: 1px solid rgba(108, 89, 72, 0.1);
  }
  .page-tab {
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    transition: transform 0.18s ease, color 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  }
  .page-tab.active {
    background: var(--accent);
    color: #fffaf4;
  }
  .page-tab:hover:not(.active) {
    background: rgba(160, 123, 95, 0.08);
    color: var(--text);
    border-color: rgba(108, 89, 72, 0.14);
    transform: translateY(-1px);
  }
  .stats {
    font-size: 12px;
    color: var(--text-soft);
    margin-left: auto;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255, 251, 245, 0.78);
    border: 1px solid rgba(108, 89, 72, 0.12);
    backdrop-filter: blur(10px);
    font-variant-numeric: tabular-nums;
  }

  .dashboard {
    display: grid;
    grid-template-columns: minmax(0, 1.12fr) minmax(0, 1fr);
    gap: 18px;
    padding: 0;
  }
  .page-shell {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .page {
    display: none;
    min-height: 0;
    height: 100%;
  }
  .page.active {
    display: flex;
  }
  .dashboard-page {
    flex-direction: column;
    overflow: auto;
    padding: 22px 24px 28px;
    background: linear-gradient(180deg, rgba(251, 247, 242, 0.52), rgba(244, 237, 229, 0.86));
  }
  .dashboard-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 18px;
    margin-bottom: 18px;
    padding: 0 2px;
  }
  .dashboard-toolbar-copy {
    min-width: 0;
  }
  .dashboard-toolbar-title {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .dashboard-toolbar-note {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.6;
  }
  .dashboard-filter-panel {
    display: flex;
    align-items: flex-end;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 12px 16px;
    padding: 12px 14px;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: rgba(255, 251, 246, 0.72);
    box-shadow: var(--shadow-soft);
  }
  .dashboard-metric-switch {
    display: flex;
    gap: 6px;
    padding: 4px;
    border-radius: 14px;
    border: 1px solid rgba(108, 89, 72, 0.1);
    background: rgba(255, 251, 246, 0.82);
  }
  .metric-pill {
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }
  .metric-pill:hover {
    transform: translateY(-1px);
    color: var(--text);
    background: rgba(160, 123, 95, 0.08);
    border-color: rgba(108, 89, 72, 0.12);
  }
  .metric-pill.active {
    background: var(--accent);
    color: #fffaf4;
  }
  .dashboard-filter-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .dashboard-filter-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .range-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .range-pill {
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid rgba(108, 89, 72, 0.12);
    background: rgba(255, 251, 246, 0.82);
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
  }
  .range-pill:hover {
    transform: translateY(-1px);
    background: rgba(245, 236, 225, 0.92);
    color: var(--text);
  }
  .range-pill.active {
    background: var(--accent);
    border-color: transparent;
    color: #fffaf4;
  }
  .date-inputs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .date-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .date-field input {
    min-width: 148px;
    padding: 8px 10px;
    border-radius: 12px;
    border: 1px solid rgba(108, 89, 72, 0.14);
    background: rgba(255, 251, 246, 0.86);
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
  }
  .date-field input:focus {
    outline: none;
    border-color: rgba(160, 123, 95, 0.3);
    background: rgba(255, 254, 251, 0.96);
  }
  .conversation-page {
    overflow: hidden;
  }
  .analytics-overview {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }
  .overview-card {
    border-radius: 18px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    background: rgba(255, 251, 246, 0.74);
    box-shadow: var(--shadow-soft);
  }
  .overview-label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .overview-value {
    font-size: 30px;
    line-height: 1;
    font-weight: 650;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-family: Georgia, "Times New Roman", serif;
  }
  .overview-subtext {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-soft);
  }
  .analytics-card {
    min-width: 0;
    border-radius: 24px;
    padding: 18px 18px 16px;
    border: 1px solid var(--border);
    background: rgba(255, 251, 246, 0.74);
    box-shadow: var(--shadow-soft);
  }
  .analytics-card-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .analytics-kicker {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .analytics-card h2 {
    font-size: 18px;
    line-height: 1.1;
    font-weight: 650;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
  }
  .analytics-meta {
    font-size: 12px;
    color: var(--text-soft);
    text-align: right;
    line-height: 1.5;
    max-width: 20ch;
  }
  .analytics-empty {
    min-height: 146px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    border-radius: 18px;
    background: rgba(160, 123, 95, 0.06);
    border: 1px dashed rgba(108, 89, 72, 0.12);
  }
  .hourly-chart {
    display: grid;
    grid-template-columns: repeat(24, minmax(0, 1fr));
    gap: 6px;
    align-items: end;
    min-height: 146px;
  }
  .hourly-chart > .analytics-empty {
    grid-column: 1 / -1;
  }
  .hourly-bar-wrap {
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .hourly-value {
    min-height: 14px;
    font-size: 10px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .hourly-bar {
    width: 100%;
    min-height: 8px;
    height: var(--bar-height, 16px);
    border-radius: 999px 999px 10px 10px;
    background: rgba(var(--heat-rgb), var(--bar-alpha, 0.16));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34);
  }
  .hourly-label {
    min-height: 12px;
    font-size: 10px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .heatmap-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .heatmap-shell {
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .heatmap {
    min-width: 610px;
    display: grid;
    grid-template-columns: 42px repeat(24, minmax(14px, 1fr));
    gap: 6px;
    align-items: center;
  }
  .heatmap-label,
  .heatmap-hour-label {
    font-size: 10px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .heatmap-label {
    font-size: 11px;
  }
  .heatmap-hour-label {
    text-align: center;
  }
  .heatmap-cell {
    aspect-ratio: 1 / 1;
    border-radius: 6px;
    background: rgba(var(--heat-rgb), var(--heat-alpha, 0.05));
    border: 1px solid rgba(108, 89, 72, 0.08);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  .heatmap-legend {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-size: 11px;
    color: var(--text-soft);
  }

  /* Source tabs */
  .source-tabs {
    display: flex;
    gap: 6px;
    padding: 4px;
    border-radius: 999px;
    background: rgba(255, 251, 246, 0.74);
    border: 1px solid rgba(108, 89, 72, 0.1);
    flex-wrap: wrap;
  }
  .source-tab {
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    transition: transform 0.18s ease, color 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  }
  .source-tab.active { color: #fffaf4; border-color: transparent; }
  .source-tab[data-source="all"].active { background: var(--accent); }
  .source-tab[data-source="claude"].active { background: var(--claude-color); }
  .source-tab[data-source="codex"].active { background: var(--codex-color); }
  .source-tab[data-source="cursor"].active { background: var(--cursor-color); }
  .source-tab:hover:not(.active) {
    background: rgba(160, 123, 95, 0.08);
    color: var(--text);
    border-color: rgba(108, 89, 72, 0.14);
    transform: translateY(-1px);
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    width: 352px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(252, 248, 243, 0.92), rgba(247, 240, 232, 0.96));
    position: relative;
  }
  .sidebar::after {
    content: "";
    position: absolute;
    top: 20px;
    bottom: 20px;
    right: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(108, 89, 72, 0.12), transparent);
    pointer-events: none;
  }

  .search-bar {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-bar::before {
    content: "Find a conversation";
    display: block;
    margin-bottom: 8px;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .search-bar input {
    width: 100%;
    background: rgba(255, 251, 246, 0.86);
    border: 1px solid rgba(108, 89, 72, 0.14);
    border-radius: 12px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 13px;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-bar input:focus {
    border-color: rgba(160, 123, 95, 0.34);
    background: rgba(255, 254, 251, 0.96);
  }

  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .conv-item {
    padding: 14px;
    border: 1px solid transparent;
    background: rgba(255, 251, 246, 0.72);
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    position: relative;
  }
  .conv-item::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 14px;
    bottom: 14px;
    width: 2px;
    border-radius: 999px;
    background: transparent;
    transition: background 0.18s ease;
  }
  .conv-item:hover {
    background: rgba(237, 229, 216, 0.88);
    border-color: rgba(108, 89, 72, 0.14);
    transform: translateY(-1px);
  }
  .conv-item.active {
    background: linear-gradient(180deg, rgba(160, 123, 95, 0.14), rgba(131, 153, 143, 0.08));
    border-color: rgba(160, 123, 95, 0.22);
    box-shadow: var(--shadow-card);
  }
  .conv-item.active::before {
    background: rgba(160, 123, 95, 0.58);
  }

  .conv-source {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .conv-source.claude { background: var(--claude-color)22; color: var(--claude-color); }
  .conv-source.codex { background: var(--codex-color)22; color: var(--codex-color); }
  .conv-source.cursor { background: var(--cursor-color)22; color: var(--cursor-color); }

  .conv-title {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .conv-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-variant-numeric: tabular-nums;
  }
  .conv-token-meta {
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .load-more {
    padding: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    border-top: 1px solid var(--border);
    background: rgba(255, 251, 246, 0.62);
  }
  .load-more:hover { background: rgba(160, 123, 95, 0.08); }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-width: 0;
  }

  /* Conversation view */
  .conv-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .conv-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(251, 247, 242, 0.94), rgba(245, 237, 228, 0.92));
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }
  .conv-header-info { flex: 1; min-width: 0; }
  .conv-header-title {
    font-size: 17px;
    font-weight: 650;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.35;
    font-family: Georgia, "Times New Roman", serif;
  }
  .conv-header-meta { font-size: 12px; color: var(--text-muted); }
  .token-row {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .token-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(160, 123, 95, 0.08);
    border: 1px solid rgba(160, 123, 95, 0.14);
    color: var(--text-soft);
  }
  .token-badge-muted {
    opacity: 0.75;
  }

  .btn {
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 6px 16px rgba(97, 77, 60, 0.08);
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-primary {
    background: var(--accent);
    color: #fffaf4;
  }
  .btn-primary:hover { box-shadow: 0 10px 20px rgba(160, 123, 95, 0.16); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: rgba(255, 251, 246, 0.8);
    color: var(--text);
    border-color: rgba(108, 89, 72, 0.14);
  }
  .btn-secondary:hover { background: rgba(245, 236, 225, 0.92); }
  .btn-ghost {
    background: rgba(160, 123, 95, 0.08);
    color: var(--text-soft);
    border-color: rgba(108, 89, 72, 0.12);
    box-shadow: none;
  }
  .btn-ghost:hover { background: rgba(160, 123, 95, 0.14); }
  .btn-small {
    font-size: 11px;
    padding: 5px 10px;
    opacity: 0.86;
  }
  .refresh-btn { padding-inline: 12px; }
  .theme-toggle { min-width: 84px; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    background:
      radial-gradient(circle at top left, rgba(160, 123, 95, 0.06), transparent 24%),
      linear-gradient(180deg, rgba(255, 252, 248, 0.46), transparent 28%);
  }

  .message {
    border-radius: 18px;
    padding: 16px 18px 15px;
    max-width: min(90%, 980px);
    border: 1px solid rgba(108, 89, 72, 0.12);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(10px);
    position: relative;
  }
  .message::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
  }
  .message.user {
    background: var(--user-bg);
    align-self: flex-end;
    border-color: rgba(160, 123, 95, 0.18);
  }
  .message.assistant {
    background: var(--assistant-bg);
    align-self: flex-start;
    border-color: rgba(108, 89, 72, 0.12);
  }
  .message-role {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .message.user .message-role { color: var(--accent2); }
  .message.assistant .message-role { color: var(--accent); }
  .message-text {
    font-size: 14px;
    line-height: 1.78;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .thinking-block {
    background: var(--thinking-bg);
    border: 1px solid rgba(108, 89, 72, 0.12);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.18s ease, background 0.18s ease;
  }
  .thinking-block:hover { border-color: rgba(160, 123, 95, 0.22); }
  .thinking-header {
    font-size: 11px;
    color: #9a8676;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
  }
  .thinking-content {
    font-size: 12px;
    color: #766658;
    margin-top: 8px;
    line-height: 1.6;
    white-space: pre-wrap;
    display: none;
  }
  .thinking-block.expanded .thinking-content { display: block; }

  .tool-badge {
    display: inline-block;
    background: rgba(160, 123, 95, 0.1);
    border: 1px solid rgba(160, 123, 95, 0.12);
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 11px;
    color: #7c6553;
    margin: 2px;
  }
  .tool-badge-muted { opacity: 0.7; }
  .tool-badges {
    margin-top: 8px;
    margin-bottom: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tool-call {
    background: rgba(250, 245, 239, 0.96);
    border: 1px solid rgba(108, 89, 72, 0.12);
    border-left: 3px solid #b8957c;
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    font-size: 12px;
  }
  .tool-call-header {
    padding: 8px 11px;
    color: #7c6553;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  .tool-status { opacity: 0.6; }
  .tool-description {
    font-size: 12px;
    color: var(--text-muted);
    margin: 2px 0 8px;
    padding: 0 11px;
  }
  .tool-input {
    margin: 0;
    padding: 8px 11px;
    background: rgba(244, 238, 230, 0.96);
    color: #5f5043;
    font-family: 'Consolas', 'Fira Code', monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
    border-top: 1px solid rgba(108, 89, 72, 0.08);
    max-height: 120px;
    overflow-y: auto;
  }
  .tool-output {
    border-top: 1px solid rgba(108, 89, 72, 0.08);
    cursor: pointer;
  }
  .tool-output-header {
    padding: 6px 11px;
    font-size: 11px;
    color: #8d7a68;
    user-select: none;
  }
  .tool-output-header:hover { color: #6f5d4e; }
  .tool-output-content {
    display: none;
    margin: 0;
    padding: 8px 11px;
    background: rgba(242, 234, 225, 0.96);
    color: #6a5b4d;
    font-family: 'Consolas', 'Fira Code', monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }
  .tool-output.expanded .tool-output-content { display: block; }
  .tool-output.expanded .tool-output-header { color: #6f5d4e; }

  .message-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    text-align: right;
  }

  /* Summary panel */
  .summary-panel {
    width: 368px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(251, 247, 242, 0.96), rgba(245, 237, 228, 0.98));
    overflow: hidden;
    position: relative;
  }
  .summary-panel::before {
    content: "";
    position: absolute;
    top: 20px;
    bottom: 20px;
    left: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(108, 89, 72, 0.12), transparent);
    pointer-events: none;
  }
  .summary-header {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 650;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.04em;
    font-family: Georgia, "Times New Roman", serif;
  }
  .summary-content {
    flex: 1;
    overflow-y: auto;
    padding: 18px 18px 28px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
  }
  .summary-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 28px 24px;
    gap: 10px;
  }
  .summary-placeholder span { font-size: 28px; }
  .summary-placeholder-note {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .summary-actions {
    margin-top: 14px;
    text-align: right;
  }

  /* Markdown-ish rendering */
  .summary-content h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin: 18px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(160, 123, 95, 0.14);
    font-family: Georgia, "Times New Roman", serif;
  }
  .summary-content h2:first-child { margin-top: 0; }
  .summary-content h3 {
    font-size: 12px;
    color: var(--text-muted);
    margin: 12px 0 6px;
    letter-spacing: 0.04em;
  }
  .summary-content p { margin-bottom: 10px; color: var(--text-soft); }
  .summary-content ul, .summary-content ol {
    margin: 6px 0 12px 18px;
  }
  .summary-content li { margin-bottom: 5px; color: var(--text-soft); }
  .summary-content strong { color: var(--text); }
  .summary-content code {
    background: rgba(160, 123, 95, 0.1);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 12px;
    font-family: monospace;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
    gap: 10px;
    text-align: center;
    padding: 32px;
  }
  .empty-state-icon { font-size: 40px; }
  .empty-state div:not(.empty-state-icon) {
    max-width: 24ch;
    line-height: 1.6;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 14px;
    animation: pulseSoft 1.4s ease-in-out infinite;
  }
  .status-error {
    padding: 14px 16px;
    border-radius: 12px;
    background: rgba(196, 106, 86, 0.12);
    border: 1px solid rgba(196, 106, 86, 0.18);
    color: #9b5c4d;
    font-size: 13px;
  }

  /* Cursor blink */

<body>

<div class="header">
  <div class="header-brand">
    <div class="header-kicker">Field notes archive</div>
    <h1>Chronicler</h1>
  </div>
  <div class="header-actions">
    <div class="page-tabs">
      <button class="page-tab active" data-view="conversations" onclick="setView('conversations', this)">对话</button>
      <button class="page-tab" data-view="dashboard" onclick="setView('dashboard', this)">仪表盘</button>
    </div>
    <div class="source-tabs">
      <button class="source-tab active" data-source="all" onclick="setSource('all', this)">全部</button>
      <button class="source-tab" data-source="claude" onclick="setSource('claude', this)">Claude Code</button>
      <button class="source-tab" data-source="codex" onclick="setSource('codex', this)">Codex</button>
      <button class="source-tab" data-source="cursor" onclick="setSource('cursor', this)">Cursor</button>
    </div>
    <button class="btn btn-secondary theme-toggle" id="themeToggle" onclick="toggleTheme()">深色</button>
    <button class="btn btn-secondary refresh-btn" onclick="refreshList()">刷新</button>
  </div>
  <div class="stats" id="stats">加载中...</div>
</div>

<div class="page-shell">
  <section class="page dashboard-page" id="dashboardPage">
    <div class="dashboard-toolbar">
      <div class="dashboard-toolbar-copy">
        <div class="dashboard-toolbar-title">Activity Window</div>
        <div class="dashboard-toolbar-note">按对话最近活跃时间过滤仪表盘统计，不影响左侧对话列表。</div>
      </div>
      <div class="dashboard-filter-panel">
        <div class="dashboard-filter-group">
          <div class="dashboard-filter-label">统计口径</div>
          <div class="dashboard-metric-switch">
            <button class="metric-pill" data-metric="tokens" onclick="setDashboardMetric('tokens', this)">Tokens</button>
            <button class="metric-pill" data-metric="conversations" onclick="setDashboardMetric('conversations', this)">Conversations</button>
          </div>
        </div>
        <div class="dashboard-filter-group">
          <div class="dashboard-filter-label">快速范围</div>
          <div class="range-pills">
            <button class="range-pill" data-range="7d" onclick="setTimePreset('7d', this)">7d</button>
            <button class="range-pill" data-range="30d" onclick="setTimePreset('30d', this)">30d</button>
            <button class="range-pill" data-range="90d" onclick="setTimePreset('90d', this)">90d</button>
            <button class="range-pill" data-range="1y" onclick="setTimePreset('1y', this)">1y</button>
            <button class="range-pill" data-range="all" onclick="setTimePreset('all', this)">All</button>
          </div>
        </div>
        <div class="date-inputs">
          <label class="date-field">
            <span>开始</span>
            <input type="date" id="dashboardStartDate" onchange="setTimeBoundary('startDate', this.value)">
          </label>
          <label class="date-field">
            <span>结束</span>
            <input type="date" id="dashboardEndDate" onchange="setTimeBoundary('endDate', this.value)">
          </label>
        </div>
      </div>
    </div>
    <div class="analytics-overview" id="analyticsOverview">
      <div class="overview-card">
        <div class="overview-label">Conversations</div>
        <div class="overview-value">-</div>
        <div class="overview-subtext">正在加载统计</div>
      </div>
    </div>
    <div class="dashboard">
      <section class="analytics-card">
        <div class="analytics-card-header">
          <div>
            <div class="analytics-kicker">Conversation Rhythm</div>
            <h2>活跃时间分布</h2>
          </div>
          <div class="analytics-meta" id="hourlySummary">按最近活跃时间统计</div>
        </div>
        <div class="hourly-chart" id="hourlyChart">
          <div class="analytics-empty">加载中...</div>
        </div>
      </section>

      <section class="analytics-card">
        <div class="analytics-card-header">
          <div>
            <div class="analytics-kicker">Weekly Activity Map</div>
            <h2>活跃热力图</h2>
          </div>
          <div class="analytics-meta" id="heatmapSummary">按最近活跃时间统计</div>
        </div>
        <div class="heatmap-wrap" id="heatmapGrid">
          <div class="analytics-empty">加载中...</div>
        </div>
      </section>
    </div>
  </section>

  <section class="page conversation-page active" id="conversationPage">
    <div class="main">
      <div class="sidebar">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="搜索对话..." oninput="onSearch(this.value)">
        </div>
        <div class="conv-list" id="convList">
          <div class="loading">加载中...</div>
        </div>
        <div class="load-more" id="loadMore" style="display:none" onclick="loadMore()">加载更多</div>
      </div>

      <div class="content">
        <div class="conv-view" id="convView">
          <div class="empty-state">
            <div class="empty-state-icon">对话</div>
            <div>选择一个对话开始浏览</div>
          </div>
        </div>
        <div class="summary-panel">
          <div class="summary-header">AI 分析摘要</div>
          <div class="summary-content" id="summaryContent">
            <div class="summary-placeholder">
              <span>摘要</span>
              <div>打开对话后点击</div>
              <div><strong>「AI 分析」</strong>按钮</div>
              <div class="summary-placeholder-note">提取问题、意图、思路和解决方案</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let state = {
  view: 'conversations',
  source: 'all',
  metric: 'tokens',
  timeFilter: {
    preset: '1y',
    startDate: '',
    endDate: '',
  },
  search: '',
  page: 1,
  total: 0,
  stats: null,
  conversations: [],
  activeId: null,
  activeMessages: [],
  searchTimer: null,
  summaryRunId: 0,
};

const LIMIT = 50;
const THEME_KEY = 'chronicler-theme';
const WEEKDAY_LABELS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
const HEATMAP_WEEK_ORDER = [1, 2, 3, 4, 5, 6, 0];
const DASHBOARD_METRIC_LABELS = {
  tokens: 'Tokens',
  conversations: 'Conversations',
};
const DASHBOARD_PRESET_CONFIG = {
  '7d': { label: '近 7 天', days: 7 },
  '30d': { label: '近 30 天', days: 30 },
  '90d': { label: '近 90 天', days: 90 },
  '1y': { label: '近 1 年', days: 365 },
  all: { label: '全部时间', days: null },
  custom: { label: '自定义时间', days: null },
};

function getPreferredTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === 'light' || saved === 'dark') return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme, persist = false) {
  const nextTheme = theme === 'dark' ? 'dark' : 'light';
  document.body.dataset.theme = nextTheme;

  const toggle = document.getElementById('themeToggle');
  if (toggle) {
    const isDark = nextTheme === 'dark';
    toggle.textContent = isDark ? '浅色' : '深色';
    toggle.setAttribute('aria-label', isDark ? '切换到浅色模式' : '切换到深色模式');
    toggle.setAttribute('title', isDark ? '切换到浅色模式' : '切换到深色模式');
  }

  if (persist) {
    localStorage.setItem(THEME_KEY, nextTheme);
  }
}

function toggleTheme() {
  applyTheme(document.body.dataset.theme === 'dark' ? 'light' : 'dark', true);
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  applyTheme(getPreferredTheme());
  applyTimePresetToState(state.timeFilter.preset);
  syncDashboardTimeFilterUi();
  renderView();
  await loadStats();
  await loadConversations(true);
}

async function loadStats(options = {}) {
  const requestSignature = getStatsRequestSignature();
  try {
    const params = new URLSearchParams({ source: state.source, metric: state.metric });
    const rangeParams = getDashboardRangeParams();
    if (rangeParams.start) params.set('start', rangeParams.start);
    if (rangeParams.end) params.set('end', rangeParams.end);
    if (options.refresh) params.set('refresh', '1');
    const r = await fetch(`/api/stats?${params}`);
    let data = await r.json();
    if (!hasActivityData(data) || data.source !== state.source || data.activity?.metric !== state.metric) {
      data = await buildStatsFallback(options.refresh);
    }
    if (requestSignature !== getStatsRequestSignature()) return;
    state.stats = data;
    document.getElementById('stats').textContent = renderStatsSummary(data);
    renderActivityDashboard(data.activity);
  } catch {
    try {
      const data = await buildStatsFallback(options.refresh);
      if (requestSignature !== getStatsRequestSignature()) return;
      state.stats = data;
      document.getElementById('stats').textContent = renderStatsSummary(data);
      renderActivityDashboard(data.activity);
    } catch {
      if (requestSignature !== getStatsRequestSignature()) return;
      document.getElementById('stats').textContent = '统计加载失败';
      renderActivityDashboard(null);
    }
  }
}

async function loadConversations(reset = false) {
  if (reset) { state.page = 1; state.conversations = []; }

  const params = new URLSearchParams({
    source: state.source,
    q: state.search,
    page: state.page,
    limit: LIMIT,
  });

  const r = await fetch(`/api/conversations?${params}`);
  const data = await r.json();

  state.total = data.total;
  state.conversations = reset ? data.items : [...state.conversations, ...data.items];

  renderList();
  document.getElementById('loadMore').style.display =
    state.conversations.length < state.total ? '' : 'none';
}

function renderList() {
  const list = document.getElementById('convList');

  if (state.conversations.length === 0) {
    list.innerHTML = '<div class="loading">没有找到对话</div>';
    return;
  }

  list.innerHTML = state.conversations.map(c => {
    const date = formatDate(c.lastTimestamp || c.timestamp);
    const project = c.project ? truncate(c.project.split(/[/\\]/).pop() || c.project, 20) : '';
    const isActive = c.id === state.activeId;
    const tokenMeta = renderTokenUsage(c.tokenUsage, { compact: true });

    return `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="openConversation('${escapeAttr(c.id)}')">
        <div><span class="conv-source ${c.source}">${c.source}</span></div>
        <div class="conv-title">${escape(c.title || '(无标题)')}</div>
        <div class="conv-meta">
          <span>${project}</span>
          <span>${date} · ${c.messageCount}条</span>
        </div>
        ${tokenMeta ? `<div class="conv-token-meta">${tokenMeta}</div>` : ''}
      </div>`;
  }).join('');
}

// ── Conversation ───────────────────────────────────────────────────────────
async function openConversation(id) {
  state.summaryRunId += 1;
  state.activeId = id;
  renderList();

  const conv = state.conversations.find(c => c.id === id);
  const view = document.getElementById('convView');

  view.innerHTML = `
    <div class="conv-header">
      <div class="conv-header-info">
        <div class="conv-header-title">${escape(conv?.title || '...')}</div>
        <div class="conv-header-meta">
          <span class="conv-source ${conv?.source}">${conv?.source}</span>
          ${conv?.project ? ` · ${escape(conv.project)}` : ''}
          · ${formatDate(conv?.lastTimestamp)}
        </div>
        <div class="token-row" id="tokenRow">${renderTokenUsage(conv?.tokenUsage, { showUnavailable: true })}</div>
      </div>
      <button class="btn btn-primary" id="summarizeBtn" onclick="summarize()">AI 分析</button>
    </div>
    <div class="messages" id="messages"><div class="loading">加载中...</div></div>`;

  // Load saved summary from server
  fetch(`/api/summaries/${encodeURIComponent(id)}`)
    .then(r => r.json())
    .then(({ text }) => {
      if (state.activeId !== id) return;
      if (text) {
        document.getElementById('summaryContent').innerHTML =
          renderMarkdown(text) + renderSummaryAction();
        const btn = document.getElementById('summarizeBtn');
        if (btn) btn.textContent = '重新分析';
      } else {
        document.getElementById('summaryContent').innerHTML = `
          <div class="summary-placeholder">
            <span>摘要</span>
            <div>点击「AI 分析」按钮</div>
            <div>分析这次对话</div>
          </div>`;
      }
    })
    .catch(() => {});

  try {
    const r = await fetch(`/api/conversations/${encodeURIComponent(id)}`);
    const data = await r.json();
    if (state.activeId !== id) return;
    if (data.tokenUsage) conv.tokenUsage = data.tokenUsage;
    const tokenRow = document.getElementById('tokenRow');
    if (tokenRow) tokenRow.innerHTML = renderTokenUsage(conv?.tokenUsage, { showUnavailable: true });
    state.activeMessages = data.messages;
    renderMessages(data.messages);
  } catch (e) {
    if (state.activeId !== id) return;
    document.getElementById('messages').innerHTML = `<div class="status-error">加载失败: ${e.message}</div>`;
  }
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  if (!messages || messages.length === 0) {
    container.innerHTML = '<div class="loading">没有消息</div>';
    return;
  }

  const filtered = messages.filter(m => ['user','assistant','thinking','tool'].includes(m.role));

  // Group consecutive thinking/tool messages before an assistant message
  const grouped = [];
  let pendingMeta = []; // thinking + tool entries before next assistant

  for (const m of filtered) {
    if (m.role === 'thinking' || m.role === 'tool') {
      pendingMeta.push(m);
    } else {
      grouped.push({ msg: m, meta: pendingMeta });
      pendingMeta = [];
    }
  }
  // If trailing meta without a final message
  if (pendingMeta.length) grouped.push({ msg: null, meta: pendingMeta });

  container.innerHTML = grouped.map(({ msg, meta }) => {
    if (!msg) return ''; // skip orphaned meta

    const isUser = msg.role === 'user';
    const time = msg.timestamp ? `<div class="message-time">${formatTime(msg.timestamp)}</div>` : '';

    // Thinking block (from Claude Code .thinking field OR Codex thinking role)
    let thinkingHtml = '';
    const thinkingItems = [];
    if (msg.thinking) thinkingItems.push(msg.thinking);
    meta.filter(m => m.role === 'thinking').forEach(m => thinkingItems.push(m.text));

    if (thinkingItems.length) {
      const content = thinkingItems.map(t => escape(t)).join('\n\n---\n\n');
      thinkingHtml = `
        <div class="thinking-block" onclick="toggleThinking(this)">
          <div class="thinking-header">思考过程 (点击展开)</div>
          <div class="thinking-content">${content}</div>
        </div>`;
    }

    // Tool use (Claude Code toolUses OR Codex tool entries)
    let toolsHtml = '';

    if (msg.toolUses?.length) {
      const pairs = msg.toolUses.filter(t => t.name !== '__result__');

      toolsHtml = pairs.map(t => {
        const inputText = formatToolInput(t.name, t.input);
        const outputHtml = t.output
          ? `<div class="tool-output" onclick="toggleToolOutput(this)">
               <div class="tool-output-header">▶ 输出 (点击展开)</div>
               <pre class="tool-output-content">${escape(t.output)}</pre>
             </div>`
          : '';
        return `<div class="tool-call">
          <div class="tool-call-header">${escape(t.name)}</div>
          ${inputText ? `<pre class="tool-input">${escape(inputText)}</pre>` : ''}
          ${outputHtml}
        </div>`;
      }).join('');
    }

    // Codex tool entries (already formatted as text)
    if (meta.some(m => m.role === 'tool')) {
      const codexTools = meta.filter(m => m.role === 'tool').map(m => {
        if (m.toolName) {
          const inputText = formatToolInput(m.toolName, m.toolInput);
          const outputText = formatToolOutput(m.toolOutput);
          const statusText = m.toolStatus ? ` <span class="tool-status">(${escape(m.toolStatus)})</span>` : '';
          const descriptionHtml = m.toolDescription
            ? `<div class="tool-description">${escape(m.toolDescription)}</div>`
            : '';
          const outputHtml = outputText
            ? `<div class="tool-output" onclick="toggleToolOutput(this)">
                 <div class="tool-output-header">▶ 输出 (点击展开)</div>
                 <pre class="tool-output-content">${escape(outputText)}</pre>
               </div>`
            : '';
          return `<div class="tool-call">
            <div class="tool-call-header">${escape(m.toolName)}${statusText}</div>
            ${descriptionHtml}
            ${inputText ? `<pre class="tool-input">${escape(inputText)}</pre>` : ''}
            ${outputHtml}
          </div>`;
        }
        return `<div class="tool-call"><div class="tool-call-header">${escape(m.text)}</div></div>`;
      }).join('');
      toolsHtml = (toolsHtml || '') + codexTools;
    }

    const text = escape(msg.text || msg.content || '').trim();

    // Cursor-specific extras
    let cursorExtras = '';
    if (msg.relevantFiles?.length) {
      const files = msg.relevantFiles.map(f => {
        const name = (f.uri?.path || f.path || f).split(/[/\\]/).pop();
        return `<span class="tool-badge">${escape(name)}</span>`;
      }).join('');
      cursorExtras += `<div class="tool-badges">${files}</div>`;
    }
    if (msg.codeBlocks?.length) {
      const codeFiles = msg.codeBlocks.map(b => {
        const fullPath = b.uri?.fsPath || b.uri?.path || '';
        const name = fullPath.split(/[/\\]/).pop() || 'file';
        return `<span class="tool-badge">${escape(name)}</span>`;
      }).join('');
      cursorExtras += `<div class="tool-badges">${codeFiles}</div>`;
    }
    if (msg.webReferences?.length) {
      const refs = msg.webReferences.map(r =>
        `<span class="tool-badge">${escape((r.title || r.url || '').slice(0, 40))}</span>`
      ).join('');
      cursorExtras += `<div class="tool-badges">${refs}</div>`;
    }
    if (msg._agentSteps > 0) {
      cursorExtras += `<div class="tool-badges"><span class="tool-badge tool-badge-muted">${msg._agentSteps} 个 agent 步骤</span></div>`;
    }

    return `
      <div class="message ${isUser ? 'user' : 'assistant'}">
        <div class="message-role">${isUser ? '用户' : 'AI 助手'}</div>
        ${toolsHtml}
        ${thinkingHtml}
        ${cursorExtras}
        ${text ? `<div class="message-text">${text}</div>` : ''}
        ${time}
      </div>`;
  }).join('');
}

function toggleToolOutput(el) {
  el.classList.toggle('expanded');
  const header = el.querySelector('.tool-output-header');
  header.textContent = el.classList.contains('expanded') ? '▼ 输出 (点击收起)' : '▶ 输出 (点击展开)';
}

function formatToolInput(name, input) {
  if (!input) return '';
  // For Bash, show the command directly
  if (name === 'Bash' && input.command) return input.command;
  // For Read/Write/Edit, show file path + summary
  if (name === 'Read' && input.file_path) return input.file_path;
  if (name === 'Write' && input.file_path) return `${input.file_path}\n[content: ${(input.content||'').length} chars]`;
  if (name === 'Edit' && input.file_path) return `${input.file_path}\n- ${(input.old_string||'').slice(0,60).replace(/\n/g,'↵')}\n+ ${(input.new_string||'').slice(0,60).replace(/\n/g,'↵')}`;
  if (name === 'Grep' && input.pattern) return `pattern: ${input.pattern}${input.path ? '\npath: '+input.path : ''}`;
  if (name === 'Glob' && input.pattern) return `pattern: ${input.pattern}`;
  if (name === 'WebSearch' && input.query) return input.query;
  if (name === 'WebFetch' && input.url) return input.url;
  if (name === 'Agent' && input.prompt) return `[${input.subagent_type||'agent'}] ${input.prompt.slice(0,120)}`;
  // Generic: show key=value pairs
  return Object.entries(input).map(([k,v]) =>
    `${k}: ${typeof v === 'string' ? v.slice(0,100) : JSON.stringify(v).slice(0,100)}`
  ).join('\n');
}

function formatToolOutput(output) {
  if (!output) return '';
  let text = '';
  if (typeof output === 'string') {
    text = output;
  } else {
    try {
      text = JSON.stringify(output, null, 2);
    } catch {
      text = String(output);
    }
  }
  return text.length > 4000 ? `${text.slice(0, 4000)}\n\n... [truncated]` : text;
}

function renderSummaryAction() {
  return '<div class="summary-actions"><button class="btn btn-ghost btn-small" onclick="summarize()">重新分析</button></div>';
}

function toggleThinking(el) {
  el.classList.toggle('expanded');
  const header = el.querySelector('.thinking-header');
  header.textContent = el.classList.contains('expanded')
    ? '思考过程 (点击收起)' : '思考过程 (点击展开)';
}

// ── Summarize ──────────────────────────────────────────────────────────────
async function summarize() {
  const summaryId = state.activeId;
  const summaryMessages = state.activeMessages;
  const summaryRunId = ++state.summaryRunId;
  const conv = state.conversations.find(c => c.id === summaryId);
  if (!summaryMessages?.length) return;

  const isCurrentSummary = () =>
    state.activeId === summaryId && state.summaryRunId === summaryRunId;

  const btn = document.getElementById('summarizeBtn');
  btn.disabled = true;
  btn.textContent = '分析中...';

  const summaryEl = document.getElementById('summaryContent');
  summaryEl.innerHTML = '<div class="loading">AI 正在分析中<span class="blink-cursor">▌</span></div>';

  let fullText = '';

  try {
    const resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: summaryMessages,
        title: conv?.title || '',
        source: conv?.source || '',
      }),
    });

    if (!resp.ok) {
      const errorText = await resp.text();
      let message = `HTTP ${resp.status}`;
      try {
        const data = JSON.parse(errorText);
        if (data?.error) message = data.error;
      } catch {
        if (errorText?.trim()) message = errorText.trim();
      }
      throw new Error(message);
    }

    if (!resp.body) {
      throw new Error('摘要响应为空');
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.text) {
            fullText += data.text;
            if (isCurrentSummary()) {
              summaryEl.innerHTML = renderMarkdown(fullText) + '<span class="blink-cursor">▌</span>';
            }
          }
          if (data.done) {
            if (fullText) {
              await fetch(`/api/summaries/${encodeURIComponent(summaryId)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: fullText }),
              });
            }
            if (isCurrentSummary()) {
              summaryEl.innerHTML = renderMarkdown(fullText) + renderSummaryAction();
              const btn = document.getElementById('summarizeBtn');
              if (btn) btn.textContent = '重新分析';
            }
          }
          if (data.error) {
            if (isCurrentSummary()) {
              summaryEl.innerHTML = `<div class="status-error">错误: ${data.error}</div>`;
            }
          }
        } catch {}
      }
    }
  } catch (e) {
    if (isCurrentSummary()) {
      summaryEl.innerHTML = `<div class="status-error">请求失败: ${e.message}</div>`;
    }
  }

  if (isCurrentSummary()) {
    btn.disabled = false;
    btn.textContent = fullText ? '重新分析' : 'AI 分析';
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function setSource(source, el) {
  state.source = source;
  document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadStats();
  loadConversations(true);
}

function onSearch(val) {
  clearTimeout(state.searchTimer);
  state.search = val;
  state.searchTimer = setTimeout(() => loadConversations(true), 300);
}

async function refreshList() {
  const r = await fetch(`/api/conversations?${new URLSearchParams({ source: state.source, q: state.search, page: 1, limit: LIMIT, refresh: 1 })}`);
  const data = await r.json();
  state.total = data.total;
  state.conversations = data.items;
  state.page = 1;
  renderList();
  await loadStats({ refresh: true });
  document.getElementById('loadMore').style.display = state.conversations.length < state.total ? '' : 'none';
}

function loadMore() {
  state.page++;
  loadConversations(false);
}

function renderMarkdown(text) {
  return text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hup])(.+)$/gm, (m) => m.trim() ? m : '')
    .replace(/^<\/p>|^<p>$/gm, '');
}

function renderStatsSummary(data) {
  if (!data) return '统计加载失败';
  const filterLabel = getTimeFilterSummaryLabel();
  const metric = data.metric === 'tokens' ? 'tokens' : 'conversations';
  const scopeSummary = metric === 'tokens'
    ? `${formatMetricValue(data.activity?.totalMetricValue || 0, metric)}`
    : `${data.total} 条对话`;

  if (data.source && data.source !== 'all') {
    const sourceLabel = ({
      claude: 'Claude Code',
      codex: 'Codex',
      cursor: 'Cursor',
    })[data.source] || data.source;
    const activeDays = data.activity?.activeDays || 0;
    return `${filterLabel} · ${sourceLabel} · ${scopeSummary} · 活跃 ${activeDays} 天`;
  }

  if (metric === 'tokens') {
    return `${filterLabel} · 共 ${scopeSummary} · Claude ${data.bySource.claude||0} · Codex ${data.bySource.codex||0} · Cursor ${data.bySource.cursor||0}`;
  }

  return `${filterLabel} · 共 ${data.total} 条对话 · Claude ${data.bySource.claude||0} · Codex ${data.bySource.codex||0} · Cursor ${data.bySource.cursor||0}`;
}

function renderActivityDashboard(activity) {
  const hourlySummary = document.getElementById('hourlySummary');
  const heatmapSummary = document.getElementById('heatmapSummary');
  const hourlyChart = document.getElementById('hourlyChart');
  const heatmapGrid = document.getElementById('heatmapGrid');
  const overview = document.getElementById('analyticsOverview');
  const metric = state.metric === 'tokens' ? 'tokens' : 'conversations';
  const metricLabel = DASHBOARD_METRIC_LABELS[metric];
  const maxHourlyValue = activity?.maxHourlyValue ?? activity?.maxHourlyCount ?? 0;

  if (!activity || !Array.isArray(activity.hourly) || !Array.isArray(activity.heatmap)) {
    hourlySummary.textContent = '按最近活跃时间统计';
    heatmapSummary.textContent = '按最近活跃时间统计';
    hourlyChart.innerHTML = '<div class="analytics-empty">暂无时间数据</div>';
    heatmapGrid.innerHTML = '<div class="analytics-empty">暂无时间数据</div>';
    overview.innerHTML = `
      <div class="overview-card">
        <div class="overview-label">Conversations</div>
        <div class="overview-value">-</div>
        <div class="overview-subtext">暂无统计数据</div>
      </div>`;
    return;
  }

  const busiestHourText = activity.busiestHour == null
    ? '暂无高峰时段'
    : `高峰 ${formatHourBucket(activity.busiestHour)}`;
  const activeDaysText = activity.activeDays
    ? `覆盖 ${activity.activeDays} 天`
    : '暂无时间数据';

  hourlySummary.textContent = `${busiestHourText} · ${activeDaysText}`;
  heatmapSummary.textContent = activity.busiestWeekday == null
    ? '暂无热区'
    : `${WEEKDAY_LABELS[activity.busiestWeekday]}最活跃 · ${formatMetricValue(activity.totalMetricValue || 0, metric)} ${metricLabel}`;

  const topHourCount = activity.busiestHour == null
    ? '暂无峰值'
    : `${formatHourBucket(activity.busiestHour)} 最活跃`;
  const topWeekdayText = activity.busiestWeekday == null
    ? '暂无活跃日'
    : `${WEEKDAY_LABELS[activity.busiestWeekday]}最活跃`;
  const sourceLabel = ({
    all: '全部来源',
    claude: 'Claude Code',
    codex: 'Codex',
    cursor: 'Cursor',
  })[state.source] || state.source;

  overview.innerHTML = `
    <div class="overview-card">
      <div class="overview-label">Scope</div>
      <div class="overview-value">${escape(sourceLabel)}</div>
      <div class="overview-subtext">当前来源筛选 · ${escape(metricLabel)}</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">${escape(metricLabel)}</div>
      <div class="overview-value">${formatMetricValue(activity.totalMetricValue || 0, metric)}</div>
      <div class="overview-subtext">${metric === 'tokens' ? `${formatCompactNumber(activity.withMetric || 0)} 条对话带 token` : '当前时间窗口内的对话总量'}</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">Peak Hour</div>
      <div class="overview-value">${activity.busiestHour == null ? '-' : formatHourBucket(activity.busiestHour)}</div>
      <div class="overview-subtext">${escape(topHourCount)} · 峰值 ${formatMetricValue(maxHourlyValue, metric)} ${metricLabel}</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">${metric === 'tokens' ? 'Token Coverage' : 'Active Days'}</div>
      <div class="overview-value">${formatCompactNumber(metric === 'tokens' ? (activity.withMetric || 0) : (activity.activeDays || 0))}</div>
      <div class="overview-subtext">${metric === 'tokens' ? `时间覆盖 ${formatCompactNumber(activity.withTimestamp || 0)} 条对话 · ${escape(topWeekdayText)}` : escape(topWeekdayText)}</div>
    </div>`;

  hourlyChart.innerHTML = renderHourlyChart(activity.hourly, maxHourlyValue, metric);
  heatmapGrid.innerHTML = renderHeatmap(
    activity.heatmap,
    activity.maxHeatmapValue ?? activity.maxHeatmapCount ?? 0,
    activity.totalMetricValue || 0,
    metric
  );
}

function setView(view, el) {
  state.view = view === 'dashboard' ? 'dashboard' : 'conversations';
  document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderView();
}

function setTimePreset(preset, el) {
  applyTimePresetToState(preset);
  syncDashboardTimeFilterUi();
  loadStats();
}

function setDashboardMetric(metric, el) {
  state.metric = metric === 'conversations' ? 'conversations' : 'tokens';
  syncDashboardTimeFilterUi();
  loadStats();
}

function setTimeBoundary(key, value) {
  state.timeFilter[key] = value || '';
  if (!state.timeFilter.startDate && !state.timeFilter.endDate) {
    state.timeFilter.preset = 'all';
  } else {
    state.timeFilter.preset = 'custom';
  }

  if (
    state.timeFilter.startDate &&
    state.timeFilter.endDate &&
    state.timeFilter.startDate > state.timeFilter.endDate
  ) {
    if (key === 'startDate') {
      state.timeFilter.endDate = state.timeFilter.startDate;
    } else {
      state.timeFilter.startDate = state.timeFilter.endDate;
    }
  }

  syncDashboardTimeFilterUi();
  loadStats();
}

function renderView() {
  const dashboardPage = document.getElementById('dashboardPage');
  const conversationPage = document.getElementById('conversationPage');
  if (dashboardPage) dashboardPage.classList.toggle('active', state.view === 'dashboard');
  if (conversationPage) conversationPage.classList.toggle('active', state.view === 'conversations');
}

function hasActivityData(data) {
  return Boolean(
    data &&
    Array.isArray(data.activity?.hourly) &&
    Array.isArray(data.activity?.heatmap)
  );
}

async function buildStatsFallback(refresh = false) {
  const conversations = await fetchConversationsForStats(state.source, refresh);
  return computeActivityFromConversations(conversations, {
    source: state.source,
    metric: state.metric,
    start: state.timeFilter.startDate,
    end: state.timeFilter.endDate,
  });
}

async function fetchConversationsForStats(source, refresh = false) {
  const limit = 500;
  const allItems = [];
  let page = 1;
  let total = Infinity;

  while (allItems.length < total) {
    const params = new URLSearchParams({
      source,
      page,
      limit,
    });
    if (refresh && page === 1) params.set('refresh', '1');

    const response = await fetch(`/api/conversations?${params}`);
    const data = await response.json();
    total = data.total || 0;
    if (!Array.isArray(data.items) || data.items.length === 0) break;
    allItems.push(...data.items);
    page += 1;
  }

  return allItems;
}

function getConversationMetricValue(conversation, metric = 'conversations') {
  if (metric === 'tokens') {
    return Math.max(0, Number(conversation?.tokenUsage?.total || 0));
  }
  return 1;
}

function computeActivityFromConversations(conversations, options = {}) {
  const source = options.source || 'all';
  const metric = options.metric === 'tokens' ? 'tokens' : 'conversations';
  const startDate = parseDateInputValue(options.start);
  const endDate = parseDateInputValue(options.end, true);
  const filtered = conversations.filter(conversation => {
    if (source && source !== 'all' && conversation.source !== source) {
      return false;
    }

    if (!startDate && !endDate) return true;

    const date = parseConversationDate(conversation.lastTimestamp || conversation.timestamp);
    if (!date) return false;
    if (startDate && date < startDate) return false;
    if (endDate && date > endDate) return false;
    return true;
  });
  const bySource = {};
  const hourly = Array.from({ length: 24 }, (_, hour) => ({ hour, count: 0 }));
  const heatmap = Array.from({ length: 7 }, () => Array(24).fill(0));
  const weekdayTotals = Array(7).fill(0);
  const activeDays = new Set();
  let withTimestamp = 0;
  let withMetric = 0;
  let totalMetricValue = 0;

  for (const conversation of filtered) {
    bySource[conversation.source] = (bySource[conversation.source] || 0) + 1;
    const date = parseConversationDate(conversation.lastTimestamp || conversation.timestamp);
    if (!date) continue;

    withTimestamp += 1;
    const metricValue = getConversationMetricValue(conversation, metric);
    if (metricValue > 0) {
      withMetric += 1;
      totalMetricValue += metricValue;
    }
    const hour = date.getHours();
    const weekday = date.getDay();
    hourly[hour].count += metricValue;
    heatmap[weekday][hour] += metricValue;
    weekdayTotals[weekday] += metricValue;

    const dayKey = [
      date.getFullYear(),
      String(date.getMonth() + 1).padStart(2, '0'),
      String(date.getDate()).padStart(2, '0'),
    ].join('-');
    activeDays.add(dayKey);
  }

  const maxHourlyCount = Math.max(0, ...hourly.map(item => item.count));
  const maxHeatmapCount = Math.max(0, ...heatmap.flat());
  const busiestHour = maxHourlyCount > 0
    ? hourly.reduce((best, item) => item.count > best.count ? item : best, hourly[0]).hour
    : null;
  const busiestWeekday = Math.max(0, ...weekdayTotals) > 0
    ? weekdayTotals.reduce((bestIndex, count, index) => count > weekdayTotals[bestIndex] ? index : bestIndex, 0)
    : null;

  return {
    source,
    metric,
    range: {
      start: options.start || '',
      end: options.end || '',
    },
    total: filtered.length,
    bySource,
    activity: {
      basedOn: 'lastTimestamp',
      metric,
      withTimestamp,
      withMetric,
      totalMetricValue,
      activeDays: activeDays.size,
      busiestHour,
      busiestWeekday,
      maxHourlyValue: maxHourlyCount,
      maxHeatmapValue: maxHeatmapCount,
      maxHourlyCount,
      maxHeatmapCount,
      hourly,
      heatmap,
    },
  };
}

function parseConversationDate(value) {
  if (!value) return null;
  const date = new Date(typeof value === 'number' ? value * 1000 : value);
  return Number.isNaN(date.getTime()) ? null : date;
}

function parseDateInputValue(value, endOfDay = false) {
  if (!value) return null;
  const match = String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!match) return null;
  const [, year, month, day] = match;
  const date = new Date(
    Number(year),
    Number(month) - 1,
    Number(day),
    endOfDay ? 23 : 0,
    endOfDay ? 59 : 0,
    endOfDay ? 59 : 0,
    endOfDay ? 999 : 0
  );
  return Number.isNaN(date.getTime()) ? null : date;
}

function applyTimePresetToState(preset) {
  const config = DASHBOARD_PRESET_CONFIG[preset] || DASHBOARD_PRESET_CONFIG['1y'];
  state.timeFilter.preset = preset in DASHBOARD_PRESET_CONFIG ? preset : '1y';

  if (config.days == null) {
    state.timeFilter.startDate = '';
    state.timeFilter.endDate = '';
    return;
  }

  const endDate = new Date();
  const startDate = new Date();
  startDate.setHours(0, 0, 0, 0);
  startDate.setDate(startDate.getDate() - (config.days - 1));

  state.timeFilter.startDate = formatDateInput(startDate);
  state.timeFilter.endDate = formatDateInput(endDate);
}

function syncDashboardTimeFilterUi() {
  document.querySelectorAll('.metric-pill').forEach(button => {
    button.classList.toggle('active', button.dataset.metric === state.metric);
  });
  document.querySelectorAll('.range-pill').forEach(button => {
    button.classList.toggle('active', button.dataset.range === state.timeFilter.preset);
  });

  const startInput = document.getElementById('dashboardStartDate');
  const endInput = document.getElementById('dashboardEndDate');
  if (startInput) startInput.value = state.timeFilter.startDate || '';
  if (endInput) endInput.value = state.timeFilter.endDate || '';
}

function getDashboardRangeParams() {
  return {
    start: state.timeFilter.startDate || '',
    end: state.timeFilter.endDate || '',
  };
}

function getStatsRequestSignature() {
  return JSON.stringify({
    source: state.source,
    metric: state.metric,
    start: state.timeFilter.startDate || '',
    end: state.timeFilter.endDate || '',
  });
}

function getTimeFilterSummaryLabel() {
  if (state.timeFilter.preset !== 'custom') {
    return DASHBOARD_PRESET_CONFIG[state.timeFilter.preset]?.label || DASHBOARD_PRESET_CONFIG['1y'].label;
  }

  if (state.timeFilter.startDate && state.timeFilter.endDate) {
    return `${state.timeFilter.startDate} 至 ${state.timeFilter.endDate}`;
  }

  if (state.timeFilter.startDate) {
    return `${state.timeFilter.startDate} 起`;
  }

  if (state.timeFilter.endDate) {
    return `截至 ${state.timeFilter.endDate}`;
  }

  return DASHBOARD_PRESET_CONFIG.all.label;
}

function formatDateInput(date) {
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2, '0'),
    String(date.getDate()).padStart(2, '0'),
  ].join('-');
}

function renderHourlyChart(hourly, maxCount, metric = 'conversations') {
  if (!hourly.some(item => item.count > 0)) {
    return '<div class="analytics-empty">还没有可用的活跃时间数据</div>';
  }

  const tickHours = new Set([0, 6, 12, 18, 23]);
  return hourly.map(({ hour, count }) => {
    const ratio = maxCount ? count / maxCount : 0;
    const height = count ? Math.round(18 + ratio * 96) : 8;
    const alpha = count ? (0.18 + ratio * 0.68).toFixed(3) : '0.08';
    const value = count ? formatMetricShortValue(count, metric) : '&nbsp;';
    const label = tickHours.has(hour) ? String(hour).padStart(2, '0') : '·';

    return `
      <div class="hourly-bar-wrap" title="${formatHourBucket(hour)} · ${formatMetricValue(count, metric)} ${DASHBOARD_METRIC_LABELS[metric]}">
        <div class="hourly-value">${value}</div>
        <div class="hourly-bar" style="--bar-height:${height}px; --bar-alpha:${alpha}"></div>
        <div class="hourly-label">${label}</div>
      </div>`;
  }).join('');
}

function renderHeatmap(heatmap, maxCount, totalCount, metric = 'conversations') {
  const hasActivity = heatmap.some(row => row.some(count => count > 0));
  if (!hasActivity) {
    return '<div class="analytics-empty">还没有可用的热力图数据</div>';
  }

  let grid = '<div class="heatmap-shell"><div class="heatmap">';
  grid += '<div class="heatmap-label"></div>';
  grid += Array.from({ length: 24 }, (_, hour) =>
    `<div class="heatmap-hour-label">${hour % 6 === 0 ? String(hour).padStart(2, '0') : ''}</div>`
  ).join('');

  for (const weekday of HEATMAP_WEEK_ORDER) {
    grid += `<div class="heatmap-label">${WEEKDAY_LABELS[weekday]}</div>`;
    grid += heatmap[weekday].map((count, hour) => {
      const ratio = maxCount ? count / maxCount : 0;
      const alpha = count ? (0.1 + ratio * 0.82).toFixed(3) : '0.04';
      return `<div class="heatmap-cell" style="--heat-alpha:${alpha}" title="${WEEKDAY_LABELS[weekday]} ${formatHourBucket(hour)} · ${formatMetricValue(count, metric)} ${DASHBOARD_METRIC_LABELS[metric]}"></div>`;
    }).join('');
  }

  grid += '</div></div>';
  grid += `<div class="heatmap-legend"><span>周一到周日，按小时展开</span><span>${formatMetricValue(totalCount, metric)} ${DASHBOARD_METRIC_LABELS[metric]}</span></div>`;
  return grid;
}

function escape(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function escapeAttr(str) {
  return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function formatTokenNumber(value) {
  return Number(value || 0).toLocaleString('en-US');
}

function formatMetricValue(value, metric = 'conversations') {
  if (metric === 'tokens') return formatTokenNumber(value);
  return formatCompactNumber(value);
}

function formatMetricShortValue(value, metric = 'conversations') {
  if (!value) return '0';
  if (metric === 'tokens') {
    return new Intl.NumberFormat('en-US', { notation: 'compact', maximumFractionDigits: value >= 100000 ? 0 : 1 }).format(value);
  }
  return formatCompactNumber(value);
}

function formatCompactNumber(value) {
  return Number(value || 0).toLocaleString('zh-CN');
}

function renderTokenUsage(tokenUsage, options = {}) {
  if (!tokenUsage || !tokenUsage.total) {
    return options.showUnavailable
      ? '<span class="token-badge token-badge-muted">tokens unavailable</span>'
      : '';
  }

  if (options.compact) {
    const approx = tokenUsage.approximate ? '~' : '';
    return `${approx}${formatTokenNumber(tokenUsage.input)} in · ${formatTokenNumber(tokenUsage.output)} out`;
  }

  const approx = tokenUsage.approximate ? '~' : '';
  const badges = [
    `<span class="token-badge">${approx}in ${formatTokenNumber(tokenUsage.input)}</span>`,
    `<span class="token-badge">${approx}out ${formatTokenNumber(tokenUsage.output)}</span>`,
    `<span class="token-badge">${approx}total ${formatTokenNumber(tokenUsage.total)}</span>`,
  ];

  if (tokenUsage.cachedInput) {
    badges.push(`<span class="token-badge token-badge-muted">cache ${formatTokenNumber(tokenUsage.cachedInput)}</span>`);
  }
  if (tokenUsage.reasoning) {
    badges.push(`<span class="token-badge token-badge-muted">reasoning ${formatTokenNumber(tokenUsage.reasoning)}</span>`);
  }

  return badges.join('');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
  if (isNaN(d)) return '';
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
  if (diff < 2592000000) return `${Math.floor(diff/86400000)}天前`;
  return d.toLocaleDateString('zh-CN');
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
  if (isNaN(d)) return '';
  return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function formatHourBucket(hour) {
  return `${String(hour).padStart(2, '0')}:00`;
}

init();
</script>
